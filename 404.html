<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | PyHiroba（ぱいひろば）</title>
  <meta name="robots" content="noindex">
  <meta name="description" content="お探しのページは見つかりませんでした。PyHiroba（ぱいひろば）のトップページからやり直してください。">

  <!-- ファビコン（本番は /pyhiroba/ 配下・絶対パスで参照） -->
  <link rel="icon" type="image/svg+xml" href="/pyhiroba/favicon.svg">
  <link rel="icon" type="image/png" href="/pyhiroba/favicon-64.png">
  <link rel="apple-touch-icon" href="/pyhiroba/apple-touch-icon.png">

  <!-- Google Fonts（絶対URLなので表示URLの階層に依存しない） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!--
    404ページは存在しないあらゆる深さのURLで表示される（GitHub Pages が
    /pyhiroba/404.html の内容をそのURLのまま配信する）。相対パスも
    /pyhiroba/ 固定の絶対パスも壊れやすいため、スタイルとテーマ処理は
    インライン化して自己完結させ、リンク先だけ JS でベースURLを算出する。
    デザインは本体の V3 Soft Brutalist（css/style.css）に合わせている。
  -->
  <script>
    // 描画前にテーマを適用してちらつきを防ぐ。localStorage キーは全ページ共通。
    (function () {
      var KEY = 'pyhiroba-theme';
      function saved() { try { return localStorage.getItem(KEY); } catch (e) { return null; } }
      function apply(t) {
        var dark = t === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        var btns = document.querySelectorAll('.theme-toggle');
        for (var i = 0; i < btns.length; i++) btns[i].setAttribute('aria-pressed', dark ? 'true' : 'false');
      }
      window.toggleTheme = function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        try { localStorage.setItem(KEY, next); } catch (e) {}
        apply(next);
      };
      apply(saved() === 'dark' ? 'dark' : 'light');
      document.addEventListener('DOMContentLoaded', function () {
        apply(document.documentElement.getAttribute('data-theme'));
      });
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #028DAE;
      --accent-dk: #01617a;
      --ink: #101418;
      --ink-2: #2b3138;
      --ink-3: #5b636c;
      --ink-4: #6b727c;
      --bg: #fbfaf7;
      --paper: #ffffff;
      --line: #e7e5e0;
      --grid: rgba(2,141,174,0.04);
      --font-ui: 'Zen Kaku Gothic New', system-ui, sans-serif;
      --font-code: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      color-scheme: light;
    }
    :root[data-theme="dark"] {
      --accent: #35aecb;
      --accent-dk: #7fd0e2;
      --ink: #e8eaed;
      --ink-2: #c9cfd6;
      --ink-3: #9aa3ad;
      --ink-4: #8b939e;
      --bg: #12161a;
      --paper: #191e24;
      --line: #2c333b;
      --grid: rgba(53,174,203,0.05);
      color-scheme: dark;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-ui);
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
      color: var(--ink);
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* トップバー */
    .nf-topbar {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 980px; width: 100%; margin: 0 auto; padding: 22px 24px;
    }
    .nf-logo {
      font-family: var(--font-ui);
      font-weight: 900; font-size: 18px; color: var(--accent);
      text-decoration: none; letter-spacing: -0.01em;
    }
    .nf-back {
      display: inline-flex; align-items: center; gap: 6px;
      height: 38px; padding: 0 16px; font-size: 13px; font-weight: 600;
      border-radius: 999px; border: 1px solid var(--ink);
      color: var(--ink); text-decoration: none; background: transparent;
      transition: background .15s, color .15s;
    }
    .nf-back:hover { background: var(--ink); color: var(--bg); }

    /* 本文（中央のヒーロー） */
    .nf-main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px 64px;
    }
    .nf-hero { text-align: center; max-width: 640px; }
    .nf-code {
      font-family: var(--font-ui);
      font-size: 132px; font-weight: 900; line-height: 1;
      letter-spacing: -0.04em; color: var(--accent);
    }
    .nf-eyebrow {
      font-family: var(--font-code);
      font-size: 13px; font-weight: 600; letter-spacing: 0.18em;
      color: var(--accent); margin-bottom: 18px; text-transform: uppercase;
    }
    .nf-hero h1 {
      font-size: 30px; font-weight: 900; letter-spacing: -0.02em;
      color: var(--ink); margin: 16px 0 14px; line-height: 1.3;
    }
    .nf-hero p {
      font-size: 16px; color: var(--ink-3); line-height: 1.9;
      max-width: 460px; margin: 0 auto;
    }
    .nf-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      margin-top: 32px;
    }
    .nf-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      height: 48px; padding: 0 24px;
      border-radius: 999px; border: 1px solid transparent;
      font-family: var(--font-ui); font-size: 15px; font-weight: 700;
      text-decoration: none; cursor: pointer; white-space: nowrap;
      transition: transform .15s ease, box-shadow .15s ease, background .15s, color .15s;
    }
    .nf-btn svg { flex-shrink: 0; }
    .nf-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    [data-theme="dark"] .nf-btn-primary { color: #0e1418; }
    .nf-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -10px rgba(2,141,174,.5); }
    .nf-btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
    .nf-btn-ghost:hover { background: var(--paper); transform: translateY(-1px); }

    /* フッター */
    .nf-footer {
      border-top: 1px solid var(--line); background: var(--paper);
      padding: 20px 24px;
    }
    .nf-footer-row {
      max-width: 980px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .nf-footer-links { display: flex; gap: 18px; flex-wrap: wrap; }
    .nf-footer-links a {
      font-size: 13px; color: var(--ink-2); font-weight: 500; text-decoration: none;
      transition: color .15s;
    }
    .nf-footer-links a:hover { color: var(--accent); }
    .nf-copy { font-size: 12.5px; color: var(--ink-4); }

    /* テーマ切替ボタン（本体フッターと同じ見た目） */
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid var(--line); background: transparent; color: var(--ink-3);
      font-family: var(--font-ui); font-size: 12.5px; font-weight: 600; cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .theme-toggle:hover { color: var(--ink); border-color: var(--ink-4); background: rgba(16,20,24,0.04); }
    [data-theme="dark"] .theme-toggle:hover { background: rgba(255,255,255,0.07); }
    .theme-toggle svg { display: block; flex-shrink: 0; }
    /* アイコンは .theme-toggle svg（詳細度0,1,1）に負けないよう配下で指定して出し分け */
    .theme-toggle .theme-ic-sun { display: none; }
    [data-theme="dark"] .theme-toggle .theme-ic-moon { display: none; }
    [data-theme="dark"] .theme-toggle .theme-ic-sun { display: block; }

    /* フォーカス可視化（キーボード操作） */
    a:focus-visible, button:focus-visible {
      outline: 3px solid var(--accent-dk); outline-offset: 2px; border-radius: 6px;
    }

    @media (max-width: 560px) {
      .nf-code { font-size: 92px; }
      .nf-hero h1 { font-size: 24px; }
      .nf-footer-row { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- トップバー -->
  <header class="nf-topbar">
    <a href="/pyhiroba/lp/" class="nf-logo" id="nf-logo-link">PyHiroba</a>
    <a href="/pyhiroba/lp/" class="nf-back" id="nf-back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      トップへ
    </a>
  </header>

  <!-- ヒーロー -->
  <main class="nf-main">
    <div class="nf-hero">
      <div class="nf-code">404</div>
      <div class="nf-eyebrow">PAGE NOT FOUND</div>
      <h1>ページが見つかりませんでした</h1>
      <p>お探しのページは、移動または削除されたか、URL が間違っている可能性があります。下のボタンからやり直してください。</p>
      <div class="nf-actions">
        <a class="nf-btn nf-btn-primary" href="/pyhiroba/lp/" id="nf-home-link">
          PyHiroba トップへ
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
        <a class="nf-btn nf-btn-ghost" href="/pyhiroba/" id="nf-app-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
          ノートブックを開く
        </a>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer class="nf-footer">
    <div class="nf-footer-row">
      <nav class="nf-footer-links" id="nf-footer-links">
        <a href="/pyhiroba/lp/" data-path="lp/">トップ</a>
        <a href="/pyhiroba/lp/errors.html" data-path="lp/errors.html">対応エラーの一覧</a>
        <a href="/pyhiroba/lp/materials.html" data-path="lp/materials.html">公開教材の一覧</a>
        <a href="/pyhiroba/lp/terms.html" data-path="lp/terms.html">利用規約</a>
      </nav>
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <span class="nf-copy">© 2026 PyHiroba</span>
        <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-pressed="false" title="ダークモードの切り替え">
          <svg class="theme-ic-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="theme-ic-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          ダークモード
        </button>
      </div>
    </div>
  </footer>

  <script>
    // 表示URLの階層に依存せず正しいリンク先を作るため、サイトのベースURLを算出する。
    // GitHub Pages のプロジェクトサイト（user.github.io/repo/）ならベースは /repo/。
    // ローカルやカスタムドメインなどはルート（/）。
    (function () {
      function siteBase() {
        if (/\.github\.io$/i.test(location.hostname)) {
          var seg = location.pathname.split('/').filter(Boolean)[0];
          return seg ? '/' + seg + '/' : '/';
        }
        return '/';
      }
      var base = siteBase();
      var set = function (id, path) { var el = document.getElementById(id); if (el) el.href = base + path; };
      set('nf-logo-link', 'lp/');
      set('nf-back-link', 'lp/');
      set('nf-home-link', 'lp/');
      set('nf-app-link', '');
      var links = document.querySelectorAll('#nf-footer-links a[data-path]');
      for (var i = 0; i < links.length; i++) links[i].href = base + links[i].getAttribute('data-path');
    })();
  </script>

</body>
</html>
